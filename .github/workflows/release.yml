name: Release

# Publishes platform-specific VSIXes to the VS Code Marketplace on a version tag.
# Each OS runner installs the Agent SDK's own-platform binary, so every target
# vsix ships a working `claude` binary (the single-machine blocker is solved here).
#
# Prerequisites (one-time, see PUBLISHING.md):
#   - A registered Marketplace publisher; set `publisher` in package.json to it.
#   - Repo secret VSCE_PAT = an Azure DevOps PAT with "Marketplace: Manage".

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-13
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Publish ${{ matrix.target }}
        # No --no-dependencies: we WANT the SDK + its per-platform binary bundled.
        run: npx @vscode/vsce publish --target ${{ matrix.target }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
