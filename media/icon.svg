<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2b30"/>
      <stop offset="1" stop-color="#161619"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ab4ff"/>
      <stop offset="1" stop-color="#7b5bd6"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="58" fill="url(#bg)"/>
  <!-- 4-point sparkle: concave-diamond arms radiating from center -->
  <g fill="url(#spark)">
    <path d="M128 42
             C132 96 160 124 214 128
             C160 132 132 160 128 214
             C124 160 96 132 42 128
             C96 124 124 96 128 42 Z"/>
    <!-- small secondary sparkle, top-right, for depth -->
    <path d="M196 60
             C198 78 210 90 228 92
             C210 94 198 106 196 124
             C194 106 182 94 164 92
             C182 90 194 78 196 60 Z" opacity="0.55"/>
  </g>
</svg>
